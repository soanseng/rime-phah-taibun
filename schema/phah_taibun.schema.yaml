# Rime schema — 拍台文 Phah Tâi-bûn
# Taiwanese Hokkien input method with mixed Han-Lo output

schema:
  schema_id: phah_taibun
  name: "拍台文(台)"
  version: "0.1.0"
  author:
    - "拍台文開發團隊"
  dependencies:
    - bopomofo_tw
    - melt_eng
  description: |
    台語輸入法方案 — 漢羅混寫輸出
    支援 POJ/TL 雙拼音系統、聲調可省略
    候選區顯示拼音註解

switches:
  - name: ascii_mode
    reset: 0
    states: [ 台文, ABC ]
  - name: full_shape
    states: [ 半形, 全形 ]
  - name: full_romanization
    reset: 0
    states: [ 漢羅, 全羅 ]
  - name: poj_mode
    reset: 0
    states: [ TL, POJ ]
  - name: emoji
    states: [ 💀, 😄 ]
    reset: 1

engine:
  processors:
    - ascii_composer
    - lua_processor@*phah_taibun_select_char
    - recognizer
    - key_binder
    - speller
    - lua_processor@*phah_taibun_commit
    - punctuator
    - selector
    - navigator
    - fluency_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - echo_translator
    - punct_translator
    - script_translator
    - reverse_lookup_translator
    - table_translator@custom_phrase
    - table_translator@melt_eng
    - lua_translator@*phah_taibun_help
    - lua_translator@*phah_taibun_date
    - lua_translator@*phah_taibun_symbols
    - lua_translator@*phah_taibun_wildcard
    - lua_translator@*phah_taibun_phrase
    - lua_translator@*phah_taibun_speedup
  filters:
    - lua_filter@*phah_taibun_filter
    - lua_filter@*phah_taibun_lookup
    - lua_filter@*phah_taibun_synonym
    - lua_filter@*phah_taibun_long_word
    - reverse_lookup_filter@phah_taibun_reverse_lookup
    - simplifier@emoji
    - uniquifier

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcba1234567890"
  initials: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '-"
  algebra:
    # === 聲調完全可省略 ===
    - derive/[1-9]$//

    # === POJ → TL 對應 ===
    - derive/^ts/ch/
    - derive/^tsh/chh/
    - derive/^j/l/
    - derive/ing/eng/
    - derive/ik/ek/
    - derive/ua/oa/
    - derive/ue/oe/
    - derive/oo/ou/
    - derive/nn/ⁿ/

    # === 進一步模糊 ===
    - derive/ph/f/
    - derive/nng/ng/
    - derive/h$//

    # === 簡拼 ===
    - abbrev/^([ptkmnbglsjhiuc]g?s?h?h?).*/$1/

translator:
  dictionary: phah_taibun
  prism: phah_taibun
  spelling_hints: 5
  comment_format:
    - "xform/^(.*)$/ [$1]/"

reverse_lookup:
  dictionary: terra_pinyin
  prism: bopomofo_tw
  prefix: "~"
  suffix: "'"
  tips: "〔注音反查〕"

custom_phrase:
  dictionary: ""
  user_dict: phah_taibun_custom
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 1

menu:
  page_size: 10
  alternative_select_keys: "asdfghjkl;"

punctuator:
  import_preset: default

key_binder:
  import_preset: default
  bindings:
    - { when: composing, accept: Tab, send: Shift+Right }
    - { when: composing, accept: Shift+Tab, send: Shift+Left }
    - { when: paging, accept: bracketleft, send: Page_Up }
    - { when: paging, accept: bracketright, send: Page_Down }

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "~[a-z0-9,./;\\-]*'?$"
    wildcard: "^\\?[a-z0-9]*$"
    phrase: "^;[a-z0-9]*$"

phah_taibun_select_char:
  first_key: bracketleft
  last_key: bracketright

phah_taibun_long_word:
  count: 2
  idx: 4

melt_eng:
  dictionary: melt_eng
  enable_sentence: false
  enable_user_dict: false
  enable_completion: true
  initial_quality: 0.5
  comment_format:
    - xform/.*//

phah_taibun_reverse_lookup:
  tags: [ reverse_lookup ]
  overwrite_comment: true
  dictionary: phah_taibun
  comment_format:
    - "xform/^(.*)$/ [$1]/"

emoji:
  option_name: emoji
  opencc_config: emoji.json
  inherit_comment: false
  tips: char
  tags: [ abc ]

editor:
  bindings:
    space: confirm
    Return: commit_raw_input
    Control+Return: commit_script_text
    BackSpace: revert
    Control+BackSpace: back_syllable
    Escape: cancel
